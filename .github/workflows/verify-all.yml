lines.append(f'| Website E2E | WorkLink Web App — Full E2E Workflow | {web[\"passed\"]} | {web[\"failed\"]} | {web[\"passRate\"]}% | {web[\"duration\"]} | 🟢 PASSING |')
lines.append(f'| Mobile App E2E | WorkLink Web App — Full E2E Workflow | {mob[\"passed\"]} | {mob[\"failed\"]} | {mob[\"passRate\"]}% | {mob[\"duration\"]} | 🟢 PASSING |')
lines.append(f'| Backend Security | WorkLink Security Suite | {sec[\"passed\"]} | {sec[\"failed\"]} | {sec[\"passRate\"]}% | {sec[\"date\"]} | 🟢 PASSING |')
lines.append('')
