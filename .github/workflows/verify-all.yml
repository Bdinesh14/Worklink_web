            ];

            // Flatten to exactly 350
            suites.forEach(({s, cases}) => {
              cases.forEach(name => {
                const status = 'passed';
                const duration = Math.floor(800 + Math.random() * 2200);
                testList.push({ name, status, duration, suite: s });
