                'TC_FORM_038 - Forgot password submit does not crash app',
                'TC_FORM_039 - Empty form submit shows validation gracefully',
                'TC_FORM_040 - Form fields are not hidden or invisible by default',
                'TC_FORM_041 - Login page accessible at 768px viewport',
                'TC_FORM_042 - Register page accessible at 768px viewport',
                'TC_FORM_043 - Forgot password accessible at 375px viewport',
                'TC_FORM_044 - Form submit does not navigate to external site',
                'TC_FORM_045 - Special characters in name field do not crash register',
