                'TC_FORM_020 - Login form button is clickable',
                'TC_FORM_021 - Login form has proper ARIA structure',
                'TC_FORM_022 - Register form has proper ARIA structure',
                'TC_FORM_023 - Forgot password form has proper ARIA structure',
                'TC_FORM_024 - Login page has at minimum 1 button',
                'TC_FORM_025 - Register page has at minimum 1 button',
                'TC_FORM_026 - Form input max-length enforced email field',
                'TC_FORM_027 - Form does not submit with XSS in email field',
                'TC_FORM_028 - Long email string does not crash form',
                'TC_FORM_029 - Password field does not show typed characters',
                'TC_FORM_030 - Form submit button text is present',
                'TC_FORM_031 - Select-role page renders interactive elements',
                'TC_FORM_032 - Onboarding page renders interactive elements',
                'TC_FORM_033 - Login page has form or div with form semantics',
                'TC_FORM_034 - Register page has form or div with form semantics',
                'TC_FORM_035 - All form inputs have type attribute set',
                'TC_FORM_036 - Form fields have name or id attribute',
