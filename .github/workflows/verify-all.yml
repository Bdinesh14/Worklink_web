                'TC_PERF_006 - CSS bundle size reasonable',
                'TC_PERF_007 - Images lazy-loaded where appropriate',
                'TC_PERF_008 - First Contentful Paint acceptable',
                'TC_PERF_009 - Time to Interactive acceptable',
                'TC_PERF_010 - No render-blocking resources',
                'TC_PERF_011 - API calls complete under 3 seconds',
                'TC_PERF_012 - No redundant API calls on load',
