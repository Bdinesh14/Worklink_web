              ]},
              // Accessibility: 20
              {s:'Accessibility',cases:[
                'TC_ACC_001 - HTML lang attribute is set',
                'TC_ACC_002 - HTML has meta charset for character encoding',
                'TC_ACC_003 - HTML has viewport meta for responsive accessibility',
                'TC_ACC_004 - Page has title element',
                'TC_ACC_005 - Login page has title element',
                'TC_ACC_006 - Buttons are keyboard focusable',
                'TC_ACC_007 - Input fields are keyboard accessible',
                'TC_ACC_008 - Images have alt attributes if images present',
                'TC_ACC_009 - Form inputs have associated labels or aria-label',
                'TC_ACC_010 - Focus indicators visible on interactive elements',
                'TC_ACC_011 - Body element is not hidden',
                'TC_ACC_012 - Root element is not hidden',
                'TC_ACC_013 - Page color contrast allows readable text',
                'TC_ACC_014 - Buttons have discernible text or aria-label',
                'TC_ACC_015 - Page renders correctly at 200% zoom',
                'TC_ACC_016 - App works with JavaScript enabled',
                'TC_ACC_017 - Tab order starts at first interactive element',
                'TC_ACC_018 - Links have href attributes',
                'TC_ACC_019 - ARIA roles are valid where used',
                'TC_ACC_020 - App accessible at small 320px mobile viewport',
              ]},
              // Regression: 50
              {s:'Regression',cases:[
                'TC_REG_001 - REG: App loads on BASE_URL',
                'TC_REG_002 - REG: Page title is non-empty',
                'TC_REG_003 - REG: Splash page renders body content',
                'TC_REG_004 - REG: Login route accessible',
                'TC_REG_005 - REG: Register route accessible',
                'TC_REG_006 - REG: Forgot password route accessible',
                'TC_REG_007 - REG: Select-role route accessible',
                'TC_REG_008 - REG: Onboarding route accessible',
                'TC_REG_009 - REG: Unknown route redirects without crash',
                'TC_REG_010 - REG: Page refresh on login does not 404',
                'TC_REG_011 - REG: Page refresh on register does not 404',
                'TC_REG_012 - REG: Browser back works from login',
                'TC_REG_013 - REG: Protected hirer route redirects',
                'TC_REG_014 - REG: Protected worker route redirects',
                'TC_REG_015 - REG: DOCTYPE present in HTML',
                'TC_REG_016 - REG: Charset meta present',
                'TC_REG_017 - REG: Viewport meta present',
                'TC_REG_018 - REG: Root div is type div',
                'TC_REG_019 - REG: App renders at 1920x1080',
                'TC_REG_020 - REG: App renders at 375x812 mobile',
                'TC_REG_021 - REG: Login email input accepts text',
                'TC_REG_022 - REG: Password field is type password',
                'TC_REG_023 - REG: All public routes accessible in sequence',
                'TC_REG_024 - REG: JS is executing on page',
                'TC_REG_025 - REG: Document readyState is complete',
                'TC_REG_026 - REG: Body is displayed',
                'TC_REG_027 - REG: No PHP errors in page',
                'TC_REG_028 - REG: No SQL errors in page',
                'TC_REG_029 - REG: No TypeError in page text',
                'TC_REG_030 - REG: No Lorem Ipsum in page text',
                'TC_REG_031 - REG: Login URL hash correct',
                'TC_REG_032 - REG: Register URL hash correct',
                'TC_REG_033 - REG: Forgot password URL hash correct',
                'TC_REG_034 - REG: Select-role URL hash correct',
                'TC_REG_035 - REG: Onboarding URL hash correct',
                'TC_REG_036 - REG: App source includes script tag',
                'TC_REG_037 - REG: App source includes link or style tag',
                'TC_REG_038 - REG: App HTML uses lang=en',
                'TC_REG_039 - REG: Root div innerHTML not empty',
                'TC_REG_040 - REG: App handles 5 sequential page loads',
                'TC_REG_041 - REG: Hirer jobs protected route renders app root',
                'TC_REG_042 - REG: Worker applications protected route renders app root',
                'TC_REG_043 - REG: Hirer chat protected route renders app root',
                'TC_REG_044 - REG: Worker chat protected route renders app root',
                'TC_REG_045 - REG: Hirer profile protected route renders app root',
                'TC_REG_046 - REG: Worker profile protected route renders app root',
                'TC_REG_047 - REG: Hirer post-job protected route renders app root',
                'TC_REG_048 - REG: Worker post-availability protected route renders',
                'TC_REG_049 - REG: Hirer notifications protected route renders app root',
                'TC_REG_050 - REG: Full E2E flow splash onboarding login register',
              ]},
              // Error Handling: 20
              {s:'Error Handling',cases:[
                'TC_ERR_001 - App does not show 500 error page',
                'TC_ERR_002 - Unknown route shows no error',
                'TC_ERR_003 - Empty form submit shows validation',
                'TC_ERR_004 - Network error shows friendly message',
                'TC_ERR_005 - Bad email format shows validation',
                'TC_ERR_006 - App recovers from JavaScript error',
                'TC_ERR_007 - No stack trace visible in production',
                'TC_ERR_008 - Error boundary catches component errors',
                'TC_ERR_009 - Firebase errors show user-friendly message',
                'TC_ERR_010 - Auth failure shows clear message',
                'TC_ERR_011 - Registration failure shows clear message',
                'TC_ERR_012 - No raw JSON errors exposed to user',
                'TC_ERR_013 - Timeout errors handled gracefully',
                'TC_ERR_014 - App stable after consecutive errors',
                'TC_ERR_015 - Error messages not overlapping UI',
                'TC_ERR_016 - Error messages are dismissible',
                'TC_ERR_017 - Error state allows retry',
                'TC_ERR_018 - 404 page handled gracefully',
                'TC_ERR_019 - App does not enter error loop',
                'TC_ERR_020 - Full error handling regression passes',
              ]},
              // Session Management: 20
              {s:'Session Management',cases:[
                'TC_SESS_001 - Session is created on login',
                'TC_SESS_002 - Session persists across page reload',
                'TC_SESS_003 - Session cleared on logout',
                'TC_SESS_004 - Expired session redirects to login',
                'TC_SESS_005 - Multiple tabs share session state',
                'TC_SESS_006 - Token refresh works automatically',
                'TC_SESS_007 - Protected route blocked without session',
                'TC_SESS_008 - Session not stored in plain text',
                'TC_SESS_009 - Firebase auth state persists correctly',
                'TC_SESS_010 - Session restored on app return',
                'TC_SESS_011 - Concurrent sessions handled',
                'TC_SESS_012 - Session cookie secure flags set',
                'TC_SESS_013 - Remember me extends session',
                'TC_SESS_014 - Role stored correctly in session',
                'TC_SESS_015 - Session invalidated on password change',
                'TC_SESS_016 - Session data not leaked in URL',
                'TC_SESS_017 - Session timeout warning shown',
                'TC_SESS_018 - New session created after logout',
                'TC_SESS_019 - Cross-site session isolation',
                'TC_SESS_020 - Full session lifecycle works correctly',
              ]},
              // Responsive: 20
              {s:'Responsive Design',cases:[
                'TC_RESP_001 - App renders at 1920x1080 desktop',
                'TC_RESP_002 - App renders at 1366x768 laptop',
                'TC_RESP_003 - App renders at 1024x768 tablet landscape',
                'TC_RESP_004 - App renders at 768x1024 tablet portrait',
                'TC_RESP_005 - App renders at 414x896 iPhone 11',
                'TC_RESP_006 - App renders at 375x812 iPhone X',
                'TC_RESP_007 - App renders at 360x640 small Android',
                'TC_RESP_008 - App renders at 320x568 iPhone SE',
                'TC_RESP_009 - No horizontal scroll at 375px',
                'TC_RESP_010 - No horizontal scroll at 768px',
                'TC_RESP_011 - Login form usable at 375px',
                'TC_RESP_012 - Register form usable at 375px',
                'TC_RESP_013 - Navigation usable at all breakpoints',
                'TC_RESP_014 - Buttons touch-friendly at 375px',
                'TC_RESP_015 - Text readable at all sizes',
                'TC_RESP_016 - Images scale correctly on mobile',
                'TC_RESP_017 - Form inputs not zoomed on focus iOS',
                'TC_RESP_018 - Content not cut off on small screens',
                'TC_RESP_019 - Consistent layout across breakpoints',
                'TC_RESP_020 - Full responsive regression passes',
              ]},
              // Input Validation: 40
              {s:'Input Validation',cases:[
                'TC_INVAL_001 - Empty email rejected on login',
                'TC_INVAL_002 - Invalid email format rejected',
                'TC_INVAL_003 - Email without domain rejected',
                'TC_INVAL_004 - Email without @ rejected',
                'TC_INVAL_005 - Empty password rejected',
                'TC_INVAL_006 - Password less than minimum length',
                'TC_INVAL_007 - XSS in email field rejected',
                'TC_INVAL_008 - SQL injection in email rejected',
                'TC_INVAL_009 - HTML tags in name field sanitized',
                'TC_INVAL_010 - Script tags in input sanitized',
                'TC_INVAL_011 - Very long email handled',
                'TC_INVAL_012 - Very long password handled',
                'TC_INVAL_013 - Emoji in email field handled',
                'TC_INVAL_014 - Unicode in password handled',
                'TC_INVAL_015 - Null bytes in input handled',
                'TC_INVAL_016 - Whitespace only input rejected',
                'TC_INVAL_017 - Leading trailing spaces trimmed',
                'TC_INVAL_018 - Register password confirm mismatch',
                'TC_INVAL_019 - Register name required field',
                'TC_INVAL_020 - Register phone format validated',
                'TC_INVAL_021 - Multiple @ in email rejected',
                'TC_INVAL_022 - Email with special characters',
                'TC_INVAL_023 - Negative numbers in numeric fields',
                'TC_INVAL_024 - Salary field accepts numbers only',
                'TC_INVAL_025 - Salary field rejects letters',
                'TC_INVAL_026 - Phone number digits only',
                'TC_INVAL_027 - Date field rejects invalid dates',
                'TC_INVAL_028 - Future date required where applicable',
