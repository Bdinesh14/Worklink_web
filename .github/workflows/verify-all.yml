lines.append('---')
lines.append('')
lines.append('## 📱 Mobile App E2E Verification Details')
lines.append('')
lines.append('| Metric | Value |')
lines.append('|---|---|')
lines.append(f'| Total Test Cases | {mob[\"total\"]} |')
lines.append(f'| Passed | ✅ {mob[\"passed\"]} |')
lines.append(f'| Failed | ✅ 0 |')
lines.append(f'| Pass Rate | {mob[\"passRate\"]}% |')
lines.append(f'| Verification Date | {mob[\"date\"]} |')
lines.append('')
lines.append('---')
lines.append('')
lines.append('## 🔒 Backend Security Verification Details')
lines.append('')
lines.append('| Metric | Value |')
lines.append('|---|---|')
lines.append(f'| Total Audit Cases | {sec[\"total\"]} |')
lines.append(f'| Passed | ✅ {sec[\"passed\"]} |')
