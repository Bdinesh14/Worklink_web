lines.append('|---|---|---|---|---|---|')
for cat, tot, pas, fai in categories:
    rate = f'{(pas/tot*100):.1f}%' if tot > 0 else '0.0%'
    st = 'PASS' if fai == 0 else 'FAIL'
    lines.append(f'| {cat} | {tot} | {pas} | {fai} | {rate} | {st} |')
lines.append('')
lines.append('---')
lines.append('')
lines.append('*Report generated automatically by WorkLink CI/CD Pipeline.*')

summary_path = os.environ.get('GITHUB_STEP_SUMMARY', '/dev/null')
with open(summary_path, 'w') as f:
    f.write('\n'.join(lines))
