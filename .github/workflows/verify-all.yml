                'TC_INVAL_030 - File size limit enforced on upload',
                'TC_INVAL_031 - File type restriction enforced',
                'TC_INVAL_032 - Max character limit on text fields',
                'TC_INVAL_033 - Search field sanitizes input',
                'TC_INVAL_034 - Dropdown selection required where needed',
                'TC_INVAL_035 - Checkbox required before submit',
