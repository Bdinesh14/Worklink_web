"

      - name: 📤 Upload Dashboard Artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: WorkLink-Verification-Dashboard-${{ github.run_number }}
          path: |
            Frontend/Web/e2e/web-results.json
            mobile-results.json
            security-results.json
          retention-days: 30
