name: 🤖 Android Appium E2E Tests + Report Hosting

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

env:
  GITHUB_USERNAME: Bdinesh14
  REPOSITORY_NAME: Worklink_web
  REPORT_BASE_URL: https://bdinesh14.github.io/Worklink_web/reports/latest/execution-report.html
  PYTHON_VERSION: '3.11'
  JAVA_VERSION: '17'
  NODE_VERSION: '20'
  API_LEVEL: '30'
  TARGET: 'google_apis'
  ARCH: 'x86_64'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  CI: 'true'

jobs:
  # ─────────────────────────────────────────────
  # JOB 1: Build APK
  # ─────────────────────────────────────────────
  build-apk:
    name: 🔨 Build Android APK
    runs-on: ubuntu-latest
    outputs:
      apk_path: worklink-upload.apk

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: ☕ Setup Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'

      - name: 🟢 Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: Frontend/Mobile/package-lock.json

      - name: 📦 Install Mobile dependencies
        working-directory: Frontend/Mobile
        run: npm ci

      - name: 🤖 Prepare Android APK
        run: |
          echo "Preparing WorkLink APK..."

          # Use pre-built APK from repo (Frontend/Mobile/worklink.apk)
          if [ -f "Frontend/Mobile/worklink.apk" ]; then
            echo "✅ Pre-built APK found: Frontend/Mobile/worklink.apk"
            cp Frontend/Mobile/worklink.apk worklink-upload.apk
          else
            echo "⚠️ No pre-built APK found — creating placeholder for CI demo"
            echo "placeholder-worklink-ci" > worklink-upload.apk
          fi
          echo "📦 APK size: $(wc -c < worklink-upload.apk) bytes"

      - name: 📤 Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: worklink-apk
          path: worklink-upload.apk
          retention-days: 30

  # ─────────────────────────────────────────────
  # JOB 2: Android Appium E2E Tests
  # ─────────────────────────────────────────────
  appium-tests:
    name: 🧪 Appium E2E Tests on Android Emulator
    needs: build-apk
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 📥 Download APK
        uses: actions/download-artifact@v4
        with:
          name: worklink-apk
          path: ./apk

      - name: ☕ Setup Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'

      - name: 🐍 Setup Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: 📦 Install Python dependencies
        run: |
          pip install --upgrade pip
          if [ -f "Frontend/Mobile/appium-tests/requirements.txt" ]; then
            pip install -r Frontend/Mobile/appium-tests/requirements.txt
          else
            echo "⚠️ requirements.txt not found — installing base Appium client"
            pip install Appium-Python-Client pytest pytest-html openpyxl requests
          fi

      - name: 🟢 Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: 📲 Install Appium
        run: |
          npm install -g appium@latest
          appium driver install uiautomator2
          echo "✅ Appium installed: $(appium --version)"

      - name: 🤖 Enable KVM for hardware acceleration
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
          sudo apt-get install -y libvirt-daemon-system
          sudo usermod -a -G kvm $USER || true

      - name: 🎮 Start Android Emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ env.API_LEVEL }}
          target: ${{ env.TARGET }}
          arch: ${{ env.ARCH }}
          profile: Nexus 6
          avd-name: WorkLink_Test_AVD
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -no-snapshot
          disable-animations: true
          script: |
            echo "✅ Emulator running"
            adb wait-for-device
            adb shell input keyevent 82 || true

      - name: 📲 Install APK on emulator
        run: |
          APK=$(find ./apk -name "*.apk" | head -1)
          echo "Installing: $APK"
          if [ -f "$APK" ]; then
            SIZE=$(wc -c < "$APK")
            if [ "$SIZE" -gt 1000 ]; then
              adb install -r "$APK"
              echo "✅ APK installed successfully"
            else
              echo "⚠️ APK is a placeholder (size: $SIZE bytes) — skipping install"
            fi
          else
            echo "⚠️ No APK found in ./apk"
          fi
        continue-on-error: true

      - name: 🚀 Start Appium server
        run: |
          appium --port 4723 --allow-insecure=adb_shell &
          sleep 10
          echo "✅ Appium server started"

      - name: 🧪 Run Appium E2E tests
        run: |
          mkdir -p "Test Results/HTML" "Test Results/Excel" "Test Results/Screenshots" "Test Results/Logs" "Test Results/Summary"

          if [ -d "Frontend/Mobile/appium-tests" ] && [ -f "Frontend/Mobile/appium-tests/conftest.py" ]; then
            cd Frontend/Mobile/appium-tests
            python -m pytest . \
              --html=../../../"Test Results/HTML/execution-report.html" \
              --self-contained-html \
              --tb=short \
              -v \
              2>&1 | tee "../../../Test Results/Logs/execution.log" || true
          else
            echo "⚠️ Appium tests not configured yet. Generating placeholder results."
            cat > "Test Results/Summary/summary.md" << 'EOF'
          # 🤖 Android Appium E2E Test Summary

          **Status:** Appium test suite not yet configured.

          **Package:** com.dinesh2525.worklink
          **APK:** worklink.apk (pre-built)

          **Next Step:** Add `Frontend/Mobile/appium-tests/` with your Appium test suite.
          EOF
          fi
        continue-on-error: true

      - name: 📊 Generate HTML Report
        if: always()
        run: |
          mkdir -p "Test Results/HTML"
          BUILD_NUMBER="${{ github.run_number }}"
          BUILD_DATE="$(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          COMMIT="${{ github.sha }}"

          cat > "Test Results/HTML/execution-report.html" << HTMLEOF
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>WorkLink Android Appium Test Report</title>
            <style>
              * { box-sizing: border-box; margin: 0; padding: 0; }
              body { font-family: 'Segoe UI', system-ui, sans-serif; background: #0d1117; color: #e6edf3; padding: 2rem; }
              h1 { color: #58a6ff; margin-bottom: 1.5rem; font-size: 1.8rem; }
              h2 { color: #79c0ff; margin: 1.5rem 0 0.75rem; font-size: 1.2rem; }
              .card { background: #161b22; border: 1px solid #30363d; border-radius: 10px; padding: 1.5rem; margin-bottom: 1rem; }
              .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1rem; }
              .stat { background: #21262d; border-radius: 8px; padding: 1rem; text-align: center; }
              .stat .value { font-size: 2rem; font-weight: bold; color: #58a6ff; }
              .stat .label { font-size: 0.85rem; color: #8b949e; margin-top: 4px; }
              .badge { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 0.8rem; font-weight: bold; }
              .badge-info { background: #1f6feb33; color: #58a6ff; border: 1px solid #1f6feb; }
              table { width: 100%; border-collapse: collapse; margin-top: 0.5rem; }
              th { background: #21262d; padding: 10px 14px; text-align: left; color: #8b949e; font-size: 0.85rem; }
              td { padding: 10px 14px; border-bottom: 1px solid #21262d; font-size: 0.9rem; }
            </style>
          </head>
          <body>
            <h1>🤖 WorkLink Android Appium E2E Report</h1>
            <div class="card">
              <div class="grid">
                <div class="stat"><div class="value">#$BUILD_NUMBER</div><div class="label">Build Number</div></div>
                <div class="stat"><div class="value"><span class="badge badge-info">Pipeline Run</span></div><div class="label">Status</div></div>
              </div>
              <table>
                <tr><th>Field</th><th>Value</th></tr>
                <tr><td>Execution Date</td><td>$BUILD_DATE</td></tr>
                <tr><td>App Package</td><td>com.dinesh2525.worklink</td></tr>
                <tr><td>Commit SHA</td><td>$COMMIT</td></tr>
                <tr><td>Repository</td><td>Bdinesh14/Worklink_web</td></tr>
              </table>
            </div>
            <div class="card">
              <h2>📋 Notes</h2>
              <p>Configure your Appium test suite in <code>Frontend/Mobile/appium-tests/</code> to see full test results in this report.</p>
            </div>
          </body>
          </html>
          HTMLEOF
          echo "✅ HTML report generated"

      - name: 📤 Upload all Appium test artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: Appium-Test-Results-${{ github.run_number }}
          path: Test Results/
          retention-days: 30

      - name: 📋 Publish GitHub Actions Step Summary
        if: always()
        run: |
          echo "## 🤖 Android Appium E2E Test Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| **Build #** | ${{ github.run_number }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **App Package** | com.dinesh2525.worklink |" >> $GITHUB_STEP_SUMMARY
          echo "| **Execution Date** | $(date -u '+%Y-%m-%d %H:%M:%S UTC') |" >> $GITHUB_STEP_SUMMARY
          echo "| **Branch** | ${{ github.ref_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Triggered by** | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          SUMMARY="Test Results/Summary/summary.md"
          if [ -f "$SUMMARY" ]; then
            cat "$SUMMARY" >> $GITHUB_STEP_SUMMARY
          else
            echo "ℹ️ Configure Appium tests in \`Frontend/Mobile/appium-tests/\` to see results here." >> $GITHUB_STEP_SUMMARY
          fi

  # ─────────────────────────────────────────────
  # JOB 3: Publish Reports to GitHub Pages
  # ─────────────────────────────────────────────
  publish-reports:
    name: 📄 Publish Reports to GitHub Pages
    needs: appium-tests
    runs-on: ubuntu-latest
    if: always() && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    environment:
      name: github-pages
      url: ${{ env.REPORT_BASE_URL }}

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 📥 Download test results
        uses: actions/download-artifact@v4
        with:
          name: Appium-Test-Results-${{ github.run_number }}
          path: ./downloaded-results/
        continue-on-error: true

      - name: 📁 Prepare report directory
        run: |
          mkdir -p reports/latest/screenshots reports/latest/logs reports/history/build-${{ github.run_number }}

          if [ -d "downloaded-results" ]; then
            cp -r downloaded-results/. reports/latest/ 2>/dev/null || true
            cp -r downloaded-results/. reports/history/build-${{ github.run_number }}/ 2>/dev/null || true
          fi

          # Create a default index if missing
          if [ ! -f "reports/latest/execution-report.html" ]; then
            cat > reports/latest/execution-report.html << 'HTMLEOF'
          <!DOCTYPE html>
          <html lang="en"><head><meta charset="UTF-8"><title>WorkLink Appium Reports</title>
          <style>body{font-family:system-ui;background:#0d1117;color:#e6edf3;display:flex;align-items:center;justify-content:center;height:100vh;margin:0;flex-direction:column;gap:1rem;}h1{color:#58a6ff;}p{color:#8b949e;}</style>
          </head><body><h1>🤖 WorkLink Appium Reports</h1><p>Reports will appear here after the first test run.</p></body></html>
          HTMLEOF
          fi

          echo "✅ Report directory prepared"

      - name: 📤 Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: reports/

      - name: 🌐 Deploy Reports to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        continue-on-error: true
