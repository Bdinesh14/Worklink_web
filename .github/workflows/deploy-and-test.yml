name: 🚀 Deploy to GitHub Pages + Selenium E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: false

# ─────────────────────────────────────────────────────────────────────────────
# JOB 1 – Build Vite app and deploy to GitHub Pages
# ─────────────────────────────────────────────────────────────────────────────
jobs:
  deploy:
    name: 🌐 Deploy to GitHub Pages
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: ⬇️ Checkout repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: Frontend/Web/package-lock.json

      - name: 📦 Install dependencies
        working-directory: Frontend/Web
        run: npm ci

      - name: 🔨 Build Vite React app
        working-directory: Frontend/Web
        run: npm run build
        env:
          # Set Vite base path to /<repo-name>/ so assets load from subdirectory
          VITE_BASE_PATH: /${{ github.event.repository.name }}/

      - name: ⚙️ Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: 📤 Upload dist as Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: Frontend/Web/dist

      - name: 🚀 Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

# ─────────────────────────────────────────────────────────────────────────────
# JOB 2 – Verify live deployment and run Selenium E2E tests
# ─────────────────────────────────────────────────────────────────────────────
  selenium-e2e:
    name: 🔍 Verify Live Deployment + 🧪 Selenium E2E Tests
    runs-on: ubuntu-latest
    needs: deploy
    if: needs.deploy.result == 'success'
    env:
      BASE_URL: ${{ needs.deploy.outputs.page_url }}

    steps:
      - name: ⬇️ Checkout repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: ⏳ Wait 30s for CDN propagation
        run: sleep 30

      - name: ✅ Verify deployed URL returns HTTP 200
        run: |
          echo "🔗 Testing: $BASE_URL"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$BASE_URL")
          echo "HTTP Status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "❌ Deployment check FAILED — HTTP $STATUS"
            exit 1
          fi
          echo "✅ Deployment live (HTTP 200)"

      - name: 🌐 Install Google Chrome
        run: |
          wget -q -O - https://dl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
          sudo sh -c 'echo "deb [arch=amd64] https://dl.google.com/linux/chrome/deb/ stable main" >> /etc/apt/sources.list.d/google.list'
          sudo apt-get update -qq
          sudo apt-get install -y google-chrome-stable

      - name: 📦 Install E2E dependencies
        working-directory: Frontend/Web/e2e
        run: npm ci

      - name: 🧪 Run Selenium E2E tests (live GitHub Pages URL)
        working-directory: Frontend/Web/e2e
        run: npm test
        continue-on-error: true
        env:
          BASE_URL: ${{ needs.deploy.outputs.page_url }}

      - name: 📊 Generate Excel + Markdown reports
        working-directory: Frontend/Web/e2e
        if: always()
        run: node utils/reportGenerator.js
        env:
          BASE_URL: ${{ needs.deploy.outputs.page_url }}

      - name: 📤 Upload test artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: Selenium-Test-Results-${{ github.run_number }}
          path: Frontend/Web/e2e/Test Results/
          retention-days: 30

      - name: 📋 Publish GitHub Actions Step Summary
        if: always()
        run: |
          echo "## 🚀 Live GitHub Pages E2E Test Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| **Deployment URL** | $BASE_URL |" >> $GITHUB_STEP_SUMMARY
          echo "| **Build Number** | #${{ github.run_number }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Triggered by** | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Execution Date** | $(date -u '+%Y-%m-%d %H:%M:%S UTC') |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          SUMMARY="Frontend/Web/e2e/Test Results/Summary/summary.md"
          if [ -f "$SUMMARY" ]; then
            cat "$SUMMARY" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ Summary report was not generated." >> $GITHUB_STEP_SUMMARY
          fi
