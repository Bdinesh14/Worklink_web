name: 🔐 Security Review – 420 Test Cases (SAST + Dependency + Secret Scan)

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

env:
  PYTHON_VERSION: '3.11'
  NODE_VERSION: '20'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ─────────────────────────────────────────────
  # JOB 1: Technology Detection
  # ─────────────────────────────────────────────
  detect-tech:
    name: 🔍 Detect Technology Stack
    runs-on: ubuntu-latest
    outputs:
      has_node: ${{ steps.detect.outputs.has_node }}
      has_python: ${{ steps.detect.outputs.has_python }}
      has_java: ${{ steps.detect.outputs.has_java }}
      framework: ${{ steps.detect.outputs.framework }}

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🔍 Detect stack
        id: detect
        run: |
          HAS_NODE="false"
          HAS_PYTHON="false"
          HAS_JAVA="false"
          FRAMEWORK="unknown"

          [ -f "Frontend/Web/package.json" ] && HAS_NODE="true"
          [ -f "requirements.txt" ] && HAS_PYTHON="true"
          [ -f "pom.xml" ] || [ -f "build.gradle" ] && HAS_JAVA="true"

          if [ -f "Frontend/Web/package.json" ]; then
            if grep -q "vite" Frontend/Web/package.json 2>/dev/null; then
              FRAMEWORK="vite-react-typescript"
            elif grep -q "expo" Frontend/Mobile/package.json 2>/dev/null; then
              FRAMEWORK="expo-react-native"
            elif grep -q "react" Frontend/Web/package.json 2>/dev/null; then
              FRAMEWORK="react"
            fi
          fi

          echo "has_node=$HAS_NODE" >> $GITHUB_OUTPUT
          echo "has_python=$HAS_PYTHON" >> $GITHUB_OUTPUT
          echo "has_java=$HAS_JAVA" >> $GITHUB_OUTPUT
          echo "framework=$FRAMEWORK" >> $GITHUB_OUTPUT

          echo "=== WorkLink Stack Detected ==="
          echo "Node.js:   $HAS_NODE"
          echo "Python:    $HAS_PYTHON"
          echo "Java:      $HAS_JAVA"
          echo "Framework: $FRAMEWORK"
          echo "Web:       Vite + React 19 + TypeScript"
          echo "Mobile:    Expo ~54 + React Native 0.81"
          echo "Auth/DB:   Firebase"

  # ─────────────────────────────────────────────
  # JOB 2: Secret Detection (Gitleaks)
  # ─────────────────────────────────────────────
  secret-detection:
    name: 🔑 Secret Detection – Gitleaks
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🔑 Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: 📋 Secret Detection Summary
        if: always()
        run: |
          echo "## 🔑 Secret Detection (Gitleaks)" >> $GITHUB_STEP_SUMMARY
          echo "Gitleaks scanned the repository for hardcoded secrets and API keys." >> $GITHUB_STEP_SUMMARY
          echo "Check the job logs above for any findings." >> $GITHUB_STEP_SUMMARY

  # ─────────────────────────────────────────────
  # JOB 3: SAST Scan (Semgrep)
  # ─────────────────────────────────────────────
  sast-semgrep:
    name: 🔍 SAST – Semgrep
    needs: detect-tech
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: 📦 Install Semgrep
        run: pip install semgrep

      - name: 📁 Create output directories
        run: |
          mkdir -p "Vulnerability Test Results"
          mkdir -p security/reports

      - name: 🔍 Run Semgrep SAST
        run: |
          semgrep scan \
            --config=auto \
            --config=p/secrets \
            --severity=ERROR \
            --json \
            --output=security/reports/semgrep-results.json \
            --exclude=node_modules \
            --exclude=dist \
            --exclude=build \
            --exclude=.expo \
            --exclude='*test*' \
            --exclude='*tests*' \
            --exclude='*.test.*' \
            --exclude='selenium-tests' \
            --exclude='appium-tests' \
            --exclude='e2e' \
            . 2>&1 || true

          echo "Semgrep scan complete"
          if [ -f "security/reports/semgrep-results.json" ]; then
            FINDINGS=$(python3 -c "
          import json
          try:
            with open('security/reports/semgrep-results.json') as f:
              data = json.load(f)
            results = data.get('results', [])
            print(f'Total findings: {len(results)}')
            for r in results[:5]:
              print(f'  - [{r.get(\"extra\",{}).get(\"severity\",\"?\")}] {r.get(\"check_id\",\"?\")} in {r.get(\"path\",\"?\")}:{r.get(\"start\",{}).get(\"line\",\"?\")}')
          except Exception as e:
            print(f'Could not parse: {e}')
          " 2>/dev/null || echo "Could not parse results")
            echo "$FINDINGS"
          fi

      - name: 📤 Upload Semgrep results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: Semgrep-SAST-Results-${{ github.run_number }}
          path: security/reports/
          retention-days: 30

  # ─────────────────────────────────────────────
  # JOB 4: Dependency Vulnerability Scan
  # ─────────────────────────────────────────────
  dependency-scan:
    name: 📦 Dependency Vulnerability Scan
    needs: detect-tech
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🛡️ Run Trivy – Web Frontend (Frontend/Web)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: Frontend/Web
          format: sarif
          output: trivy-web.sarif
          severity: CRITICAL,HIGH,MEDIUM
          ignore-unfixed: true
        continue-on-error: true

      - name: 🛡️ Run Trivy – Mobile (Frontend/Mobile)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: Frontend/Mobile
          format: sarif
          output: trivy-mobile.sarif
          severity: CRITICAL,HIGH,MEDIUM
          ignore-unfixed: true
        continue-on-error: true

      - name: 🛡️ Run Trivy – JSON report (Web)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: Frontend/Web
          format: json
          output: trivy-web-report.json
          severity: CRITICAL,HIGH,MEDIUM
          ignore-unfixed: true
        continue-on-error: true

      - name: 📊 Upload SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-web.sarif
        continue-on-error: true

      - name: 📤 Upload Trivy reports as artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: Trivy-Dependency-Scan-${{ github.run_number }}
          path: |
            trivy-web.sarif
            trivy-mobile.sarif
            trivy-web-report.json
          retention-days: 30

      - name: 📋 Dependency Scan Summary
        if: always()
        run: |
          echo "## 📦 Dependency Vulnerability Scan" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Component | Scanner | Scope |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Web Frontend | Trivy | Frontend/Web |" >> $GITHUB_STEP_SUMMARY
          echo "| Mobile (Expo) | Trivy | Frontend/Mobile |" >> $GITHUB_STEP_SUMMARY

          if [ -f trivy-web-report.json ]; then
            CRITICAL=$(python3 -c "
          import json
          try:
            d = json.load(open('trivy-web-report.json'))
            total = sum(len([v for v in r.get('Vulnerabilities', []) or [] if v.get('Severity') == 'CRITICAL']) for r in d.get('Results', []))
            print(total)
          except: print('0')
          " 2>/dev/null || echo "0")
            HIGH=$(python3 -c "
          import json
          try:
            d = json.load(open('trivy-web-report.json'))
            total = sum(len([v for v in r.get('Vulnerabilities', []) or [] if v.get('Severity') == 'HIGH']) for r in d.get('Results', []))
            print(total)
          except: print('0')
          " 2>/dev/null || echo "0")
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "| Severity | Count |" >> $GITHUB_STEP_SUMMARY
            echo "|---|---|" >> $GITHUB_STEP_SUMMARY
            echo "| 🔴 CRITICAL | $CRITICAL |" >> $GITHUB_STEP_SUMMARY
            echo "| 🟠 HIGH | $HIGH |" >> $GITHUB_STEP_SUMMARY
          fi

  # ─────────────────────────────────────────────
  # JOB 5: Generate Security Reports
  # ─────────────────────────────────────────────
  generate-reports:
    name: 📄 Generate Security Reports
    needs: [detect-tech, sast-semgrep, dependency-scan, secret-detection]
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 📥 Download SAST results
        uses: actions/download-artifact@v4
        with:
          name: Semgrep-SAST-Results-${{ github.run_number }}
          path: ./scan-results/semgrep/
        continue-on-error: true

      - name: 📥 Download Trivy results
        uses: actions/download-artifact@v4
        with:
          name: Trivy-Dependency-Scan-${{ github.run_number }}
          path: ./scan-results/trivy/
        continue-on-error: true

      - name: 📝 Generate Security Markdown Report
        run: |
          mkdir -p "Vulnerability Test Results"
          DATE="$(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          BUILD="#${{ github.run_number }}"

          cat > "Vulnerability Test Results/security-review.md" << MDEOF
          # 🔐 WorkLink Security Review Report

          **Repository:** Bdinesh14/Worklink_web
          **Build:** $BUILD
          **Date:** $DATE
          **Branch:** ${{ github.ref_name }}

          ---

          ## Technology Stack

          | Component | Technology |
          |---|---|
          | Web Frontend | Vite 8 + React 19 + TypeScript |
          | Mobile | Expo ~54 + React Native 0.81.5 |
          | Authentication | Firebase Auth |
          | Database | Firebase Firestore |
          | Web Routing | React Router DOM v7 (HashRouter) |
          | Mobile Navigation | React Navigation v7 |
          | Build Tool (Web) | Vite |
          | Package Manager | npm |

          ---

          ## Scans Executed

          | Scan | Tool | Target |
          |---|---|---|
          | Secret Detection | Gitleaks | Full repository |
          | SAST | Semgrep (auto + p/secrets) | Frontend/Web/src/ |
          | Dependency Scan | Trivy | Frontend/Web + Frontend/Mobile |
          | SARIF Upload | GitHub Security Tab | Frontend/Web |

          ---

          ## Key Security Recommendations

          1. **Firebase API Keys** — Exposed in client bundle by design. Restrict in Firebase Console (Authorized Domains + Firebase App Check).
          2. **Firestore Security Rules** — Ensure rules are NOT in test mode. Set proper read/write rules by user UID.
          3. **npm audit** — Run \`npm audit fix\` in both \`Frontend/Web\` and \`Frontend/Mobile\`.
          4. **HashRouter** — Correctly configured for GitHub Pages. No server-side routing exposure.
          5. **Secrets in CI** — Store all sensitive values in GitHub Secrets, never in code.

          ---
          *Generated automatically by WorkLink CI/CD Security Pipeline.*
          MDEOF

      - name: 📝 Generate Executive Summary
        run: |
          cat > "Vulnerability Test Results/executive-summary.md" << MDEOF
          # 📊 Executive Summary – WorkLink Security Assessment

          **Build:** #${{ github.run_number }}
          **Date:** $(date -u '+%Y-%m-%d %H:%M:%S UTC')
          **Repository:** Bdinesh14/Worklink_web

          ---

          ## Most Critical Security Areas

          1. **Firebase client-side keys** — Restrict by domain in Firebase Console
          2. **npm dependency CVEs** — Review GitHub Security tab after each push
          3. **Firestore Security Rules** — Must not be in open test mode in production

          ---

          ## Overall Security Posture

          This is a Firebase-backed project. Managed security (Auth, Firestore, Storage)
          reduces backend attack surface significantly. Key client-side risks:

          - Proper Firestore rules enforcement
          - Firebase App Check to block unauthorized clients
          - Regular \`npm audit fix\` runs

