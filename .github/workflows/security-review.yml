                  "GitHub Actions workflow permissions minimal", "GitHub Actions concurrency limits set",
                  "GitHub branch protection rules on main", "GitHub CODEOWNERS file present",
                  "GitHub security advisories reviewed", "GitHub code scanning enabled",
                  "GitHub secret scanning enabled", "GitHub dependency review on PRs",
              ],
              "Business Logic & Application Security": [
                  "Free tier features not accessible without account", "Paid features gated behind subscription",
                  "Job post creation limited to hirers", "Job application limited to workers",
                  "User cannot apply to own job post", "Hirer cannot accept own application",
                  "Chat only between matched hirer/worker", "Rating only after job completion",
                  "Job price cannot be negative", "Job price cannot exceed platform limits",
                  "Date validation on job scheduling", "Past dates not accepted for new jobs",
                  "Duplicate job prevention implemented", "Spam detection on job posts",
                  "Fake review detection implemented", "Profile verification required before hiring",
                  "Background check integration tested", "Terms of service acceptance tracked",
                  "Age verification enforced (18+)", "Geographic restrictions enforced",
                  "Business rules documented", "Business rule violations logged",
                  "Abuse report flow implemented", "Content moderation in place",
                  "Auto-suspension on abuse threshold", "Appeal process for suspended accounts",
                  "Refund policy enforced correctly", "Payment dispute handling tested",
                  "Subscription cancellation works", "Data portability export works",
                  "Account deletion permanently removes data", "Right to be forgotten implemented",
