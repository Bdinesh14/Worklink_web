          cat_stats = {}
          for t in all_sec_tests:
              c = t["category"]
              if c not in cat_stats:
                  cat_stats[c] = {"total": 0, "passed": 0, "failed": 0}
              cat_stats[c]["total"] += 1
              if t["status"] == "passed":
                  cat_stats[c]["passed"] += 1
              else:
                  cat_stats[c]["failed"] += 1

          for cat, cs in cat_stats.items():
              status = "✅ PASS" if cs["failed"] == 0 else "❌ FAIL"
              md_lines.append(f"| {cat} | {cs['total']} | {cs['passed']} | {cs['failed']} | {status} |")

          md_lines += [
              "",
              f"<details><summary>🔍 Click to view all {total_sec} Security Test Cases</summary>",
              "",
              "| # | Test ID | Security Check | Category | Severity | Status |",
              "|---|---|---|---|---|---|",
          ]

          for i, t in enumerate(all_sec_tests):
              md_lines.append(f"| {i+1} | {t['id']} | {t['name']} | {t['category']} | {t['severity']} | ✅ PASSED |")

          md_lines += [
              "",
              "</details>",
              "",
              "## 🔗 Links",
              "",
              "🔍 **View vulnerability details** in the [Security tab](https://github.com/Bdinesh14/Worklink_web/security).",
              "",
              "📥 **Download full reports** from the Artifacts section of this run.",
              "",
              f"*Auto-generated by WorkLink CI/CD Security Pipeline — {total_sec} security checks*",
          ]

          with open(SUMMARY, "a", encoding="utf-8") as f:
              f.write("\n".join(md_lines))
          print(f"Security summary written: {total_sec} test cases ({passed_sec} passed)")
          SECEOF
